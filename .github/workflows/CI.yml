name: ML Pipeline CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    # 1. Checkout code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # 3. Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Install DVC
    - name: Install DVC
      run: |
        pip install dvc

    # 5. Run your ML pipeline (IMPORTANT)
    - name: Run DVC pipeline
      run: |
        dvc repro

    # 6. Run tests (MLflow accuracy test included)
    # - name: Run pytest tests
    #   run: |
    #     pytest tests/
